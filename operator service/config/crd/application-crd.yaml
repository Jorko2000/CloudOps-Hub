apiVersion: apiextensions.k8s.io/v1

kind: CustomResourceDefinition

metadata:
  name: applications.cloudops.io

spec:

  group: cloudops.io

  names:
    kind: Application
    plural: applications
    singular: application

  scope: Namespaced

  versions:

    - name: v1

      served: true

      storage: true

      schema:

        openAPIV3Schema:

          type: object

          properties:

            spec:

              type: object

              properties:

                image:
                  type: string

                replicas:
                  type: integer

version: "3.8"

services:

  postgres:

    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloudops

    ports:
      - "5432:5432"

  auth-service:

    build: .

    ports:
      - "8080:8080"

    depends_on:
      - postgres
